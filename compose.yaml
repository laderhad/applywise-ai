name: applywise

services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-applywise}
      POSTGRES_USER: ${POSTGRES_USER:-applywise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-applywise_dev}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  backend:
    build:
      context: ./backend/ApplyWise.Api
    depends_on:
      database:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=database;Port=5432;Database=${POSTGRES_DB:-applywise};Username=${POSTGRES_USER:-applywise};Password=${POSTGRES_PASSWORD:-applywise_dev}
      Ollama__BaseUrl: http://host.docker.internal:11434
      Ollama__Model: ${OLLAMA_MODEL:-llama3.1:8b}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "5232:8080"

  frontend:
    build:
      context: ./frontend/applywise-client
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
